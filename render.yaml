services:
  - type: web
    name: palace-history-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/.cache/ms-playwright"
      - key: DATABASE_URL
        fromDatabase:
          name: palace-history-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false  # Vercel 배포 후 설정

databases:
  - name: palace-history-db
    plan: free
